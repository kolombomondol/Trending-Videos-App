Name: Auto Fetch Trending Videos

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর অটো রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write

jobs:
  update-json:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install google-api-python-client firebase-admin requests

      # 🔴 ১. ইউটিউব ভিডিও ফেচ করে videos.json তৈরি করবে
      - name: Run YouTube Script
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
          API_KEY_6: ${{ secrets.API_KEY_6 }}
          API_KEY_7: ${{ secrets.API_KEY_7 }}
          API_KEY_8: ${{ secrets.API_KEY_8 }}
          API_KEY_9: ${{ secrets.API_KEY_9 }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
        run: python fetch_videos.py

      # 🟢 ২. টিকটক ভিডিও ফেচ করে tiktok_videos.json তৈরি করবে
      - name: Run TikTok Script
        env:
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}
        run: python tiktok_scraper.py

      # 🔄 ৩. ইউটিউব ও টিকটকের ফাইলগুলো আলাদাভাবে গিটহাবে Commit & Push করবে
      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json tiktok_videos.json tiktok_seen_ids.json
          git commit -m "🔄 Auto-updated YouTube (videos.json) & TikTok (tiktok_videos.json) data" || exit 0
          git push
