name: Auto Fetch Trending Videos

on:
  schedule:
    - cron: '0 */6 * * *' # প্রতি ৬ ঘণ্টা পর পর অটো রান হবে
  workflow_dispatch: # ম্যানুয়ালি রান করার অপশন

permissions:
  contents: write # গিটহাবে ফাইল পুশ করার পারমিশন

jobs:
  update-json: # আপনার জবের নামের সাথে মিল রাখা হলো
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository Code
        uses: actions/checkout@v4 # লেটেস্ট ভার্সন ব্যবহার করা হয়েছে

      - name: Set up Python
        uses: actions/setup-python@v5 # লেটেস্ট ভার্সন ব্যবহার করা হয়েছে
        with:
          python-version: '3.10'

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install google-api-python-client

      - name: Run Python Script
        env:
          API_KEY_1: ${{ secrets.API_KEY_1 }}
          API_KEY_2: ${{ secrets.API_KEY_2 }}
          API_KEY_3: ${{ secrets.API_KEY_3 }}
          API_KEY_4: ${{ secrets.API_KEY_4 }}
          API_KEY_5: ${{ secrets.API_KEY_5 }}
        run: python fetch_videos.py # আপনার পাইথন স্ক্রিপ্ট রান হবে

      - name: Commit and Push Changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add videos.json
          git commit -m "🔄 Auto-updated videos.json data" || exit 0
          git push
